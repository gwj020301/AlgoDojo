  - typescript
  description: 假设你正在爬楼梯，需要 n 阶你才能到达楼顶。每次你可以爬 1 或 2 个台阶，你有多少种不同的方法可以爬到楼顶呢？
  reference_solution: f(n)=f(n-1)+f(n-2)，即斐波那契。用两个变量滚动递推，时间 O(n)、空间 O(1)。
  templates:
    python: "class Solution:\n    def climbStairs(self, n: int) -> int:\n        # TODO: 实现\n        pass\n"
    typescript: "function climbStairs(n: number): number {\n  // TODO: 实现\n  return 0;\n}\n"
  knowledge_tips:
  - title: 什么是动态规划（DP）
    content: 动态规划把大问题拆成「重叠的子问题」，先解小的、用结果推大的，避免重复计算。三要素：① 状态（dp[i] 表示什么）② 转移方程（dp[i] 由哪些更小的状态得来）③ 边界（最小状态的初值）。
  - title: 滚动变量优化空间
    content: 当 dp[i] 只依赖前面固定的几个状态（如本题只用 dp[i-1]、dp[i-2]）时，不必开整个数组，用几个变量「滚动」即可把空间从 O(n) 降到 O(1)。
    code:
      python: "a, b = 1, 1          # f(0)=1, f(1)=1\nfor _ in range(n - 1):\n    a, b = b, a + b  # 同时更新，滚动前进\n\
        return b\n"
  - title: 本题状态与转移
    content: 到达第 n 阶，最后一步要么从 n-1 跨 1 阶、要么从 n-2 跨 2 阶上来，故 f(n)=f(n-1)+f(n-2)，边界 f(1)=1、f(2)=2。本质就是斐波那契数列。
  test_cases:
  - input: '{"n": 2}'
    expected_output: '2'
    is_sample: true
  - input: '{"n": 3}'
    expected_output: '3'
    is_sample: false
  - input: '{"n": 5}'
    expected_output: '8'
    is_sample: false
  hints:
  - level: 1
    content: 到达第 n 阶，最后一步只能从 n-1 或 n-2 上来。
  - level: 2
    content: 因此方法数 f(n) = f(n-1) + f(n-2)。
  - level: 3
    content: "a, b = 1, 1              # f(1), f(2)\n重复 n - 1 次:\n    a, b = b, a + b      # 滚动前进\n返回\
      \ b"
  - level: 4
    content: 本质是斐波那契数列，滚动变量即可 O(1) 空间。
