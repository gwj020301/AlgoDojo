patterns:
- pattern_name: 滑动窗口
  language: python
  code: "def sliding_window(s: str) -> int:\n    left = 0\n    window = {}\n    best = 0\n    for right,\
    \ c in enumerate(s):\n        window[c] = window.get(c, 0) + 1\n        while window[c] > 1:  # 收缩条件\n\
    \            window[s[left]] -= 1\n            left += 1\n        best = max(best, right - left +\
    \ 1)\n    return best\n"
  mnemonic: 右扩入窗，越界则左缩；窗口合法时更新答案。
- pattern_name: 滑动窗口
  language: typescript
  code: "function slidingWindow(s: string): number {\n  let left = 0, best = 0;\n  const window = new\
    \ Map<string, number>();\n  for (let right = 0; right < s.length; right++) {\n    const c = s[right];\n\
    \    window.set(c, (window.get(c) ?? 0) + 1);\n    while ((window.get(c) ?? 0) > 1) {\n      window.set(s[left],\
    \ window.get(s[left])! - 1);\n      left++;\n    }\n    best = Math.max(best, right - left + 1);\n\
    \  }\n  return best;\n}\n"
  mnemonic: 右扩入窗，越界则左缩；窗口合法时更新答案。
- pattern_name: 二分查找
  language: python
  code: "def binary_search(nums: list[int], target: int) -> int:\n    lo, hi = 0, len(nums) - 1\n    while\
    \ lo <= hi:\n        mid = (lo + hi) // 2\n        if nums[mid] == target:\n            return mid\n\
    \        if nums[mid] < target:\n            lo = mid + 1\n        else:\n            hi = mid - 1\n\
    \    return -1\n"
  mnemonic: 循环不变量：答案落在 [lo, hi]；mid 偏左，按条件收缩半区。
- pattern_name: 二分查找
  language: typescript
  code: "function binarySearch(nums: number[], target: number): number {\n  let lo = 0, hi = nums.length\
    \ - 1;\n  while (lo <= hi) {\n    const mid = (lo + hi) >> 1;\n    if (nums[mid] === target) return\
    \ mid;\n    if (nums[mid] < target) lo = mid + 1;\n    else hi = mid - 1;\n  }\n  return -1;\n}\n"
  mnemonic: 循环不变量：答案落在 [lo, hi]；mid 偏左，按条件收缩半区。
- pattern_name: 回溯
  language: python
  code: "def backtrack(nums: list[int]) -> list[list[int]]:\n    res, path = [], []\n    def dfs(start:\
    \ int) -> None:\n        res.append(path[:])\n        for i in range(start, len(nums)):\n        \
    \    path.append(nums[i])\n            dfs(i + 1)\n            path.pop()  # 撤销选择\n    dfs(0)\n  \
    \  return res\n"
  mnemonic: 选择 → 递归 → 撤销选择；进入前剪枝，路径满足即收集。
- pattern_name: 回溯
  language: typescript
  code: "function backtrack(nums: number[]): number[][] {\n  const res: number[][] = [], path: number[]\
    \ = [];\n  const dfs = (start: number): void => {\n    res.push([...path]);\n    for (let i = start;\
    \ i < nums.length; i++) {\n      path.push(nums[i]);\n      dfs(i + 1);\n      path.pop();\n    }\n\
    \  };\n  dfs(0);\n  return res;\n}\n"
  mnemonic: 选择 → 递归 → 撤销选择；进入前剪枝，路径满足即收集。
- pattern_name: 广度优先搜索
  language: python
  code: "from collections import deque\n\ndef bfs(start, neighbors) -> int:\n    q = deque([start])\n\
    \    seen = {start}\n    steps = 0\n    while q:\n        for _ in range(len(q)):\n            node\
    \ = q.popleft()\n            for nxt in neighbors(node):\n                if nxt not in seen:\n  \
    \                  seen.add(nxt)\n                    q.append(nxt)\n        steps += 1\n    return\
    \ steps\n"
  mnemonic: 队列逐层扩展，入队即标记已访问，适合最短路/层序。
- pattern_name: 广度优先搜索
  language: typescript
  code: "function bfs(start: number, neighbors: (n: number) => number[]): number {\n  const q: number[]\
    \ = [start];\n  const seen = new Set<number>([start]);\n  let steps = 0;\n  while (q.length) {\n \
    \   const size = q.length;\n    for (let i = 0; i < size; i++) {\n      const node = q.shift()!;\n\
    \      for (const nxt of neighbors(node)) {\n        if (!seen.has(nxt)) { seen.add(nxt); q.push(nxt);\
    \ }\n      }\n    }\n    steps++;\n  }\n  return steps;\n}\n"
  mnemonic: 队列逐层扩展，入队即标记已访问，适合最短路/层序。
