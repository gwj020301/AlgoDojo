problems:
- number: 1
  title: 两数之和
  topic: 哈希
  difficulty: easy
  languages:
  - python
  - typescript
  description: 给定一个整数数组 nums 和一个目标值 target，请你在该数组中找出和为目标值的那两个整数，并返回它们的数组下标。你可以假设每种输入只会对应一个答案，且同一个元素不能使用两遍。
  reference_solution: 用哈希表存放 值->下标。遍历时查 target-num 是否已出现，命中即返回两个下标，时间 O(n)、空间 O(n)。
  templates:
    python: "class Solution:\n    def twoSum(self, nums: list[int], target: int) -> list[int]:\n     \
      \   # TODO: 实现\n        pass\n"
    typescript: "function twoSum(nums: number[], target: number): number[] {\n  // TODO: 实现\n  return\
      \ [];\n}\n"
  knowledge_tips:
  - title: 什么是哈希表（Hash Table）
    content: '哈希表通过「哈希函数」把键（key）映射到存储位置，从而实现平均 O(1) 的插入、删除和查找。它用空间换时间：把「某个值是否出现过 / 出现在哪」这类查询，从遍历的 O(n)
      降到接近 O(1)。

      Python 的 dict（字典）和 set（集合）底层都是哈希表。'
  - title: Python 中怎么创建和使用
    content: '创建：

      · 空字典 d = {} 或 d = dict()

      · 空集合 s = set()（注意 {} 是空字典，不是空集合）

      常用操作（均摊 O(1)）：

      · 增 / 改：d[key] = value

      · 查存在：key in d

      · 取值（带默认，避免 KeyError）：d.get(key, default)

      · 删除：del d[key] 或 d.pop(key, None)

      · 遍历键值：for k, v in d.items()'
    code:
      python: "d = {}              # 创建空字典\nd['a'] = 1          # 写入\nif 'a' in d:        # O(1) 判断键是否存在\n\
        \    print(d['a'])\nprint(d.get('b', 0))  # 不存在返回默认值 0\n\nfrom collections import defaultdict,\
        \ Counter\ncnt = Counter('aabbbc')   # {'a':2,'b':3,'c':1} 计数神器\ng = defaultdict(list)     # 值默认空列表，省去判断\n\
        g['x'].append(1)\n"
      typescript: 'const m = new Map<string, number>(); // 推荐用 Map

        m.set(''a'', 1);

        if (m.has(''a'')) console.log(m.get(''a''));

        console.log(m.get(''b'') ?? 0);  // 不存在给默认值


        const s = new Set<number>();   // 集合：只判存在

        s.add(7);

        console.log(s.has(7));

        '
  - title: 必备知识 / 易错点
    content: '1. 键必须「可哈希」：数字、字符串、元组可作键；列表、字典不可（会报 unhashable type）。

      2. 哈希查找是「平均」O(1)，极端情况可能退化，但刷题中按 O(1) 估算即可。

      3. dict 从 Python 3.7 起保持「插入顺序」。

      4. 想统计出现次数用 collections.Counter；想要默认值用 defaultdict，比手动 if 判断更简洁。

      5. 集合 set 适合「去重」和「只关心存在与否」的场景。'
  - title: 本题如何用哈希
    content: '边遍历边建哈希表 seen = {值: 下标}。对当前 x，先查 target - x 是否已在 seen 中：在就说明配对的另一个数之前出现过，直接返回两个下标；不在就把 x
      存入 seen 继续。一次遍历、O(n) 时间，避免了 O(n^2) 的双重循环。'
    code:
      python: "seen = {}\nfor i, x in enumerate(nums):\n    if target - x in seen:\n        return [seen[target\
        \ - x], i]\n    seen[x] = i\n"
  test_cases:
  - input: '{"nums": [2, 7, 11, 15], "target": 9}'
    expected_output: '[0, 1]'
    is_sample: true
  - input: '{"nums": [3, 2, 4], "target": 6}'
    expected_output: '[1, 2]'
    is_sample: false
  - input: '{"nums": [3, 3], "target": 6}'
    expected_output: '[0, 1]'
    is_sample: false
  hints:
  - level: 1
    content: 暴力是 O(n^2) 双重循环，想想如何用额外空间换时间。
  - level: 2
    content: 遍历时，对每个 num 需要快速判断 target-num 是否出现过。
  - level: 3
    content: "seen = {}                      # 值 -> 下标\nfor i, x in enumerate(nums):\n    if target -\
      \ x in seen:      # 配对的数之前出现过\n        return [seen[target - x], i]\n    seen[x] = i           \
      \      # 记录当前值的下标"
  - level: 4
    content: 用哈希表记录 值->下标，一次遍历即可，时间/空间均 O(n)。
